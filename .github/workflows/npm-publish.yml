# Build standalone + minimal `npm-publish/` package, then publish to npm.
# Bump `version` in root package.json before tagging.
#
# Setup:
# 1. Create an npm automation token: https://docs.npmjs.com/creating-and-viewing-access-tokens
# 2. Add repository secret NPM_TOKEN (classic) or use OIDC with "trusted publishing" on npm.

name: Publish chat to npm

on:
  push:
    tags:
      - "chat-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '25.x'
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
      - name: Install dependencies and build
        run: npm ci && npm run build
      - name: Prepare npm-publish bundle (standalone + bin only)
        run: node scripts/prepare-npm-publish.mjs
      - name: Publish to npm
        run: npm publish ./npm-publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
